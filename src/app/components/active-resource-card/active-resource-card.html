<div class="card">
  <div class="row">
    <div class="left">
      <i [class]="name === 'machine name' ? 'fa-solid fa-gear' : 'fa-solid fa-user'" style="color: #ffffff;"></i>
      <p>{{name}}</p>
    </div>
    <div class="right">
      <i class="fa-solid fa-play fa-xs" style="color: #05ad6d;"></i>
    </div>
  </div>
  <div class="running-ticket">Running</div>
  <div class="details">
    <div class="details-row">
      <p class="title">{{resourceTitle}}</p>
      <p>{{resourceName}}</p>
    </div>
    <div class="details-row">
      <p class="title">Current Task:</p>
      <p>Task Name - Piece Name and reference</p>
    </div>
    <p class="project-name">Project Name</p>
    <div class="details-row">
      <p class="title">Started:</p>
      <p>12/02/2025 8:00 AM</p>
    </div>
  </div>
</div>
