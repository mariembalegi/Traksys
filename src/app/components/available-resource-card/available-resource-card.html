<div class="card">
  <div class="row">
    <div class="left">
      <i [class]="name === 'machine name' ? 'fa-solid fa-gear' : 'fa-solid fa-user'" style="color: #ffffff;"></i>
      <p>{{name}}</p>
    </div>
    <div class="right">
      <i class="fa-solid fa-wrench fa-xs" style="color: #FF4136;"></i>
    </div>
  </div>
  <div class="available-ticket">Available</div>
  <div class="details">
    <p>Available for assignment</p>
  </div>
</div>
